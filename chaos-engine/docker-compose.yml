version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Chaos Engineering & Self-Healing Platform — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

networks:
  chaos_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  model_cache:

services:

  # ── ML Intelligence Backend ──────────────────────────────────────────────
  ml_backend:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: chaos_ml_backend
    restart: unless-stopped
    networks:
      - chaos_net
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/isolation_forest.joblib
      - PYTHONUNBUFFERED=1
    volumes:
      - model_cache:/app
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Streamlit SRE Dashboard ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chaos_dashboard
    restart: unless-stopped
    networks:
      - chaos_net
    ports:
      - "8501:8501"
    environment:
      - ML_BACKEND_URL=http://ml_backend:8000
      - CHAOS_OPERATOR_URL=http://host.docker.internal:9000
      - PYTHONUNBUFFERED=1
    depends_on:
      ml_backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Prometheus (scrapes /metrics from ml_backend) ─────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: chaos_prometheus
    restart: unless-stopped
    networks:
      - chaos_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=6h"
    depends_on:
      - ml_backend